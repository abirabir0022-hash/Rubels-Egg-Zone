<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fresh Egg Order</title>
<style>
body{margin:0;font-family:Arial;background:#f3f6fb}
.card{max-width:430px;margin:18px auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.hero{background:linear-gradient(135deg,#ffb300,#ff7b00);padding:26px;color:#fff;text-align:center}
.hero h1{margin:0}.hero p{margin:8px 0 0}
.c{padding:18px} .pkg{border:1px solid #ddd;border-radius:12px;padding:10px;margin:10px 0}
input,textarea{width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;margin:8px 0;box-sizing:border-box}
button{width:100%;padding:14px;border:0;border-radius:12px;background:#ff7b00;color:#fff;font-size:17px;font-weight:bold}
.badge{background:#e8fff0;color:#14833b;padding:8px;border-radius:10px;text-align:center;margin:10px 0}
</style></head><body><div class="card"><div class="hero"><h1>🥚 ফ্রেশ ডিম</h1><p>আজই অর্ডার করুন • Cash on Delivery</p></div><div class="c">
<div class="badge">🚚 দ্রুত ডেলিভারি</div>
<label class="pkg"><input type="radio" name="p" checked> ২০টি ডিম — <b>২৪০ টাকা</b></label>
<label class="pkg"><input type="radio" name="p"> ৩০টি ডিম — <b>৩৬০ টাকা</b></label>
<label class="pkg"><input type="radio" name="p"> ৬০টি ডিম — <b>৭২০ টাকা</b></label>
<input placeholder="আপনার নাম">
<input placeholder="মোবাইল নম্বর">
<textarea placeholder="সম্পূর্ণ ঠিকানা"></textarea>
<button>অর্ডার করুন</button>
</div></div></body></html>
